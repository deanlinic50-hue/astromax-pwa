<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroMax Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;600;900&display=swap');
        :root { --bg-deep: #020617; --accent: #3b82f6; }
        body { background-color: var(--bg-deep); color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.25rem; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input, select { background: rgba(2, 6, 23, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 0.75rem !important; padding: 0.75rem !important; width: 100%; outline: none; }
        .result-item { border-left: 4px solid var(--accent); background: rgba(255, 255, 255, 0.03); padding: 1rem; border-radius: 0 0.75rem 0.75rem 0; }
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #search-results { position: absolute; z-index: 50; width: 100%; max-height: 200px; overflow-y: auto; background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; margin-top: 2px; }
    </style>
</head>
<body class="pb-10">

<div class="container mx-auto max-w-lg mt-4 px-4">
    <header class="mb-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black tracking-tighter uppercase italic">Astro<span class="text-blue-500">Max</span></h1>
            <div class="flex gap-2">
                <button onclick="getUserLocation()" class="p-2 bg-blue-500/10 rounded-full text-blue-400 active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                </button>
                <button onclick="refreshWeather()" class="p-2 bg-blue-500/10 rounded-full text-blue-400 active:scale-95 transition-transform">
                    <svg id="sync-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v5m0-5h5"/></svg>
                </button>
            </div>
        </div>

        <div class="relative mb-4">
            <div class="flex gap-2">
                <input type="text" id="location-input" placeholder="Search (e.g. Potočnica)..." class="flex-grow text-sm">
                <button onclick="searchLocation()" class="bg-blue-600 px-4 rounded-xl font-bold text-sm">Search</button>
            </div>
            <div id="search-results" class="hidden shadow-2xl border border-white/10"></div>
        </div>

        <div class="glass-card p-4 flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M2 12h2"/><path d="M20 12h2"/></svg>
            </div>
            <div>
                <p id="city-name" class="font-bold text-sm leading-tight text-white italic capitalize italic">Ready</p>
                <p id="coords-display" class="text-[10px] text-slate-500 mono mt-1 tracking-wider uppercase">Waiting for input...</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Clouds</span>
            <span id="cloud-val" class="text-xl font-black text-white">--%</span>
        </div>
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Wind Speed</span>
            <span id="wind-val" class="text-xl font-black text-cyan-400">-- km/h</span>
        </div>
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Seeing</span>
            <span id="seeing-val" class="text-xl font-black text-emerald-400">--</span>
        </div>
        <div class="glass-card p-3 text-center border-2 border-blue-500/20 cursor-pointer active:bg-blue-500/10 transition-colors" onclick="manualSqmSet()">
            <span class="text-[10px] font-black uppercase text-blue-400 block mb-1 underline">SQM (Est.)</span>
            <span id="sqm-val" class="text-xl font-black text-amber-500">--</span>
        </div>
    </div>

    <div class="glass-card p-5 space-y-5 mb-6">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Object (M/NGC)</label>
                <input type="text" id="obj-id" placeholder="M31" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">F-Ratio</label>
                <input type="number" id="f-ratio" value="4.8" step="0.1" oninput="calculate()">
            </div>
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block tracking-widest">Sensor Type</label>
            <select id="cam-type" onchange="calculate()">
                <option value="osc">One-Shot Color (OSC)</option>
                <option value="mono">Monochrome (L-RGB-SHO)</option>
            </select>
        </div>
    </div>

    <div id="results-list" class="space-y-3"></div>

    <div id="weather-alert" class="hidden mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-bold flex items-center gap-3 uppercase text-center">
        <span class="w-full text-center">Adverse weather conditions detected</span>
    </div>
</div>

<script>
    let state = { lat: null, lon: null, clouds: 0, wind: 0, humid: 0, sqm: 21.0, seeing: 2.0, baseSqm: 20.0 };

    async function getUserLocation() {
        const cityNameEl = document.getElementById('city-name');
        cityNameEl.innerText = "Locating...";
        if (!navigator.geolocation) { alert("GPS not supported."); return; }

        navigator.geolocation.getCurrentPosition(
            async function(p) {
                state.lat = p.coords.latitude;
                state.lon = p.coords.longitude;
                document.getElementById('coords-display').innerText = state.lat.toFixed(4) + "N / " + state.lon.toFixed(4) + "E";
                await reverseGeocode();
                await refreshWeather();
            },
            function(err) { alert("GPS error. Check settings."); cityNameEl.innerText = "GPS Error"; },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    async function reverseGeocode() {
        try {
            const res = await fetch("https://nominatim.openstreetmap.org/reverse?lat=" + state.lat + "&lon=" + state.lon + "&format=json").then(r => r.json());
            const city = res.address.city || res.address.town || res.address.village || "Remote Area";
            document.getElementById('city-name').innerText = city;

            const fullName = res.display_name.toLowerCase();
            if (fullName.includes("potočnica") || fullName.includes("pag") || fullName.includes("novalja")) {
                state.baseSqm = 21.80;
            } else {
                state.baseSqm = 20.20;
            }
        } catch(e) { console.log(e); }
    }

    async function refreshWeather() {
        if(!state.lat) { getUserLocation(); return; }
        const icon = document.getElementById('sync-icon');
        icon.classList.add('loader');
        
        try {
            const wRes = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + state.lat + "&longitude=" + state.lon + "&current=relative_humidity_2m,wind_speed_10m,cloud_cover").then(r => r.json());
            
            state.clouds = wRes.current.cloud_cover;
            state.wind = wRes.current.wind_speed_10m;
            state.humid = wRes.current.relative_humidity_2m;

            if (state.baseSqm > 21.5) {
                state.sqm = state.baseSqm.toFixed(2);
            } else {
                let penalty = (state.clouds / 100) * 1.5;
                state.sqm = (state.baseSqm - penalty).toFixed(2);
            }

            state.seeing = (1.2 + (state.wind / 20) + (state.humid / 250)).toFixed(1);
            updateUI();
            calculate();
        } catch (e) { console.log(e); }
        finally { icon.classList.remove('loader'); }
    }

    function manualSqmSet() {
        let input = prompt("Enter SQM (e.g. 21.8):", state.sqm);
        if(input) {
            state.sqm = parseFloat(input);
            state.baseSqm = state.sqm;
            updateUI();
            calculate();
        }
    }

    function updateUI() {
        document.getElementById('cloud-val').innerText = state.clouds + "%";
        document.getElementById('wind-val').innerText = state.wind + " km/h";
        document.getElementById('sqm-val').innerText = state.sqm;
        document.getElementById('seeing-val').innerText = state.seeing + '"';
        
        const alertBox = document.getElementById('weather-alert');
        if (state.clouds > 65) alertBox.classList.remove('hidden');
        else alertBox.classList.add('hidden');
    }

    function calculate() {
        const fr = parseFloat(document.getElementById('f-ratio').value) || 4.8;
        const cam = document.getElementById('cam-type').value;
        const list = document.getElementById('results-list');
        list.innerHTML = '';

        const skyFactor = Math.pow(2.51, (state.sqm - 20.0));
        const fRatioFactor = Math.pow(fr / 4.8, 2);
        let baseSub = 45 * skyFactor * fRatioFactor;

        if (cam === 'osc') {
            render(list, "RGB / Broadband", Math.round(baseSub), "3.0h", "border-blue-500");
            render(list, "Narrowband (Dual)", Math.round(baseSub * 6), "6.0h", "border-cyan-500");
        } else {
            render(list, "Luminance", Math.round(baseSub * 0.7), "2.0h", "border-slate-300");
            render(list, "Narrowband (S/H/O)", Math.round(baseSub * 10), "10h", "border-purple-600");
        }
    }

    function render(parent, title, sub, total, colorClass) {
        const div = document.createElement('div');
        div.className = "result-item " + colorClass;
        div.innerHTML = '<div class="flex justify-between items-center"><div><h4 class="text-xs font-black uppercase text-white/90">' + title + '</h4><p class="text-[9px] text-slate-500 font-black mt-1">Total: ' + total + '</p></div><div class="text-right"><span class="text-2xl font-black mono text-white">' + sub + 's</span><p class="text-[9px] text-blue-500 font-black uppercase">Sub Exp</p></div></div>';
        parent.appendChild(div);
    }

    async function searchLocation() {
        const query = document.getElementById('location-input').value;
        if (!query) return;
        const res = await fetch("https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(query) + "&format=json&limit=5").then(r => r.json());
        const container = document.getElementById('search-results');
        container.innerHTML = '';
        if (res.length > 0) {
            container.classList.remove('hidden');
            res.forEach(function(item) {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-3 text-sm text-slate-300 border-b border-white/10 hover:bg-blue-600 transition-colors";
                btn.innerText = item.display_name;
                btn.onclick = function() {
                    state.lat = parseFloat(item.lat);
                    state.lon = parseFloat(item.lon);
                    document.getElementById('coords-display').innerText = state.lat.toFixed(4) + "N / " + state.lon.toFixed(4) + "E";
                    container.classList.add('hidden');
                    reverseGeocode();
                    refreshWeather();
                };
                container.appendChild(btn);
            });
        }
    }

    window.onload = getUserLocation;
</script>
</body>
</html>
