<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstroMax Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&family=Inter:wght@400;600;900&display=swap');
        body { background-color: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body.night-mode { background-color: #000 !important; color: #ff0000 !important; }
        body.night-mode .glass-card { background: rgba(30, 0, 0, 0.6); border-color: rgba(255, 0, 0, 0.2); }
        body.night-mode input, body.night-mode select { background: #1a0000 !important; color: #ff0000 !important; border-color: #440000 !important; }
        body.night-mode .text-blue-500, body.night-mode .text-cyan-400, body.night-mode .text-emerald-400, body.night-mode .text-amber-500 { color: #ff0000 !important; }
        body.night-mode .bg-blue-600 { background-color: #880000 !important; }
        
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        input, select { background: rgba(2, 6, 23, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 0.5rem !important; padding: 0.6rem !important; width: 100%; outline: none; }
        .result-item { border-left: 4px solid #3b82f6; background: rgba(255, 255, 255, 0.03); padding: 0.8rem 1rem; border-radius: 0 0.5rem 0.5rem 0; margin-bottom: 0.75rem; }
        body.night-mode .result-item { border-left-color: #ff0000; background: rgba(255, 0, 0, 0.05); }
        #search-results { position: absolute; z-index: 50; width: 100%; max-height: 200px; overflow-y: auto; background: #0f172a; border: 1px solid #1e293b; border-radius: 0.5rem; margin-top: 2px; }
        .loader { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

<div class="container mx-auto max-w-lg mt-4 px-4">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black uppercase italic tracking-tighter text-white">Astro<span class="text-blue-500">Max</span></h1>
        <div class="flex gap-2">
            <button onclick="toggleNightMode()" class="p-2 bg-blue-500/10 rounded-full text-blue-400 hover:bg-blue-500/20 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button onclick="getUserLocation()" class="p-2 bg-blue-500/10 rounded-full text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </button>
            <button onclick="refreshWeather()" class="p-2 bg-blue-500/10 rounded-full text-blue-400">
                <svg id="sync-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V3m0 5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v5m0-5h5"/></svg>
            </button>
        </div>
    </header>

    <div class="relative mb-4">
        <div class="flex gap-2">
            <input type="text" id="loc-input" placeholder="Search city (e.g. Potočnica)..." class="text-sm">
            <button onclick="searchLoc()" class="bg-blue-600 px-5 rounded-lg font-bold text-xs uppercase text-white">Search</button>
        </div>
        <div id="search-results" class="hidden"></div>
    </div>

    <div class="glass-card p-4 flex items-center gap-4 mb-6">
        <div class="w-10 h-10 bg-blue-600/20 rounded-lg flex items-center justify-center text-blue-400 font-bold text-xs">LOC</div>
        <div>
            <p id="city-name" class="font-bold text-sm text-white italic">Detecting...</p>
            <p id="coords-display" class="text-[10px] text-slate-500 mono-font uppercase tracking-wider">0.0000N / 0.0000E</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Clouds</span>
            <span id="cloud-val" class="text-xl font-black">--%</span>
        </div>
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Wind Speed</span>
            <span id="wind-val" class="text-xl font-black text-cyan-400">-- km/h</span>
        </div>
        <div class="glass-card p-3 text-center">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">Seeing</span>
            <span id="seeing-val" class="text-xl font-black text-emerald-400">--</span>
        </div>
        <div class="glass-card p-3 text-center border border-amber-500/10">
            <span class="text-[10px] font-black uppercase text-slate-500 block mb-1">SQM (Est.)</span>
            <span id="sqm-val" class="text-xl font-black text-amber-500">--</span>
        </div>
    </div>

    <div class="glass-card p-5 space-y-4 mb-8">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Object (M/NGC)</label>
                <input type="text" id="obj-id" placeholder="M31" oninput="calculate()">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">F-Ratio</label>
                <input type="number" id="f-ratio" value="4.8" step="0.1" oninput="calculate()">
            </div>
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-500 mb-1 block">Sensor Type</label>
            <select id="cam-type" onchange="calculate()">
                <option value="osc">One-Shot Color (OSC)</option>
                <option value="mono">Monochrome (L-RGB-SHO)</option>
            </select>
        </div>
    </div>

    <div id="results-list"></div>
</div>

<script>
    let state = { lat: 44.85, lon: 13.85, clouds: 0, wind: 0, sqm: 21.0, baseSqm: 20.2 };

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
    }

    function getUserLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(p => {
            state.lat = p.coords.latitude; state.lon = p.coords.longitude;
            updateUI(); reverseGeocode(); refreshWeather();
        });
    }

    function searchLoc() {
        let q = document.getElementById('loc-input').value;
        if(!q) return;
        fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`)
        .then(r => r.json()).then(res => {
            let container = document.getElementById('search-results');
            container.innerHTML = '';
            if(res.length > 0) {
                container.classList.remove('hidden');
                res.forEach(item => {
                    let b = document.createElement('button');
                    b.className = "w-full text-left p-3 text-sm text-slate-300 border-b border-white/5 hover:bg-blue-600";
                    b.innerText = item.display_name;
                    b.onclick = () => {
                        state.lat = parseFloat(item.lat); state.lon = parseFloat(item.lon);
                        container.classList.add('hidden'); updateUI(); reverseGeocode(); refreshWeather();
                    };
                    container.appendChild(b);
                });
            }
        });
    }

    function reverseGeocode() {
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${state.lat}&lon=${state.lon}&format=json`)
        .then(r => r.json()).then(res => {
            document.getElementById('city-name').innerText = res.address.city || res.address.town || res.address.village || "Remote Area";
            state.baseSqm = res.display_name.toLowerCase().includes("pag") || res.display_name.toLowerCase().includes("potočnica") ? 21.8 : 20.2;
        });
    }

    function refreshWeather() {
        let icon = document.getElementById('sync-icon');
        icon.classList.add('loader');
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&current=wind_speed_10m,cloud_cover`)
        .then(r => r.json()).then(w => {
            state.clouds = w.current.cloud_cover;
            state.wind = w.current.wind_speed_10m;
            state.sqm = state.baseSqm > 21.5 ? state.baseSqm : (state.baseSqm - (state.clouds/100)).toFixed(2);
            updateUI(); calculate();
            icon.classList.remove('loader');
        });
    }

    function updateUI() {
        document.getElementById('coords-display').innerText = `${state.lat.toFixed(4)}N / ${state.lon.toFixed(4)}E`;
        document.getElementById('cloud-val').innerText = state.clouds + "%";
        document.getElementById('wind-val').innerText = state.wind + " km/h";
        document.getElementById('sqm-val').innerText = state.sqm;
        document.getElementById('seeing-val').innerText = (1.2 + (state.wind/20)).toFixed(1) + '"';
    }

    function calculate() {
        let fr = parseFloat(document.getElementById('f-ratio').value) || 4.8;
        let cam = document.getElementById('cam-type').value;
        let list = document.getElementById('results-list');
        list.innerHTML = '';

        let sky = Math.pow(2.51, (state.sqm - 20.0));
        let base = 45 * sky * Math.pow(fr / 4.8, 2);

        if (cam === 'osc') {
            addRes(list, "RGB / Broadband", Math.round(base), "3.0h");
            addRes(list, "Narrowband (Dual)", Math.round(base * 6), "6.0h");
        } else {
            addRes(list, "Luminance", Math.round(base * 0.75), "2.0h");
            addRes(list, "RGB Filters", Math.round(base * 1.2), "3.0h"); // Dodano RGB za Mono
            addRes(list, "Narrowband (S/H/O)", Math.round(base * 10), "10h");
        }
    }

    function addRes(parent, title, sub, total) {
        let div = document.createElement('div');
        div.className = "result-item";
        div.innerHTML = `
            <div class="flex justify-between items-center">
                <div>
                    <h4 class="text-[10px] font-black uppercase text-slate-400 mb-1">${title}</h4>
                    <p class="text-[9px] text-slate-500 uppercase">Target: ${total}</p>
                </div>
                <div class="text-right">
                    <span class="text-2xl font-black mono-font text-white">${sub}s</span>
                    <p class="text-[8px] text-blue-500 font-bold uppercase tracking-widest">Subexp</p>
                </div>
            </div>`;
        parent.appendChild(div);
    }

    window.onload = getUserLocation;
</script>
</body>
</html>
